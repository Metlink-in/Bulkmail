services:
  - type: web
    name: bulkreach-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: bulkreach_prod
      - key: JWT_SECRET_KEY
        sync: false
      - key: JWT_ALGORITHM
        value: HS256
      - key: ENCRYPTION_KEY
        sync: false
      - key: ADMIN_EMAIL
        value: jiteshbawaskar05@gmail.com
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_NAME
        value: Jitesh Bawaskar
      - key: APP_ENV
        value: production
      - key: BACKEND_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
