<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMTP Vault - Admin BulkReach Pro</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/dashboard.css">
    <style>
        .admin-sidebar-badge { background: var(--admin-accent); color: #000; font-size: 10px; font-weight: 800; padding: 2px 6px; border-radius: 4px; margin-left: auto; }
        .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:999; align-items:center; justify-content:center; }
        .modal.active { display:flex; }
        .modal-box { background: var(--bg-primary); border-radius: var(--radius-xl); width: 100%; max-width: 700px; max-height: 90vh; overflow-y: auto; padding: 28px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
        .modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
        .modal-header h2 { font-size: 17px; font-weight: 700; }
        .modal-close { cursor:pointer; color:var(--text-muted); font-size:22px; line-height:1; background:none; border:none; padding:0; }
        .modal-close:hover { color: var(--text-primary); }
        .profile-block { border: 1px solid var(--border); border-radius: var(--radius-md); margin-bottom: 12px; overflow: hidden; }
        .profile-block-head { padding: 10px 16px; background: var(--bg-secondary); font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 8px; }
        .profile-block-body { padding: 16px; display: grid; grid-template-columns: 130px 1fr; gap: 8px 16px; font-size: 13px; }
        .dl { color: var(--text-muted); font-weight: 500; display: flex; align-items: center; }
        .dv { color: var(--text-primary); font-family: monospace; display: flex; align-items: center; gap: 8px; word-break: break-all; }
        .reveal-btn { background: none; border: 1px solid var(--border); cursor: pointer; color: var(--primary); font-size: 11px; padding: 2px 8px; border-radius: 4px; white-space: nowrap; flex-shrink: 0; }
        .reveal-btn:hover { background: rgba(37,99,235,0.08); }
        .imap-sep { grid-column: 1/-1; border-top: 1px solid var(--border); margin: 4px 0 8px; }
        .imap-label { grid-column: 1/-1; font-size: 11px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 4px; }
    </style>
</head>
<body class="admin-mode">
<div class="dashboard-layout">
    <aside class="sidebar" style="background:var(--bg-sidebar);">
        <div class="sidebar-logo" style="color:var(--text-primary)">
            BulkReach <span class="admin-sidebar-badge">ADMIN</span>
        </div>
        <nav class="sidebar-nav">
            <a href="/admin.html" class="sidebar-nav-item">Overview</a>
            <a href="/pages/admin-users.html" class="sidebar-nav-item">Users</a>
            <a href="/pages/admin-jobs.html" class="sidebar-nav-item">All Jobs</a>
            <a href="/pages/admin-logs.html" class="sidebar-nav-item">All Logs</a>
            <a href="/pages/admin-credentials.html" class="sidebar-nav-item active">Credentials</a>
            <a href="/pages/admin-live.html" class="sidebar-nav-item" style="color:var(--danger)">Live Monitor</a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="page-header">
            <div>
                <div style="font-size:12px; font-weight:600; color:var(--admin-accent); margin-bottom:4px;">ADMIN &bull; CREDENTIALS</div>
                <h1 class="page-title">SMTP Vault</h1>
                <p style="color:var(--text-secondary); font-size:13px; margin-top:2px;">View and inspect sender profiles for any user account.</p>
            </div>
        </header>

        <div class="card">
            <p style="color:var(--warning); margin-bottom:20px; font-size:13px; display:flex; align-items:center; gap:8px;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
                Passwords are decrypted on-demand (admin only). Handle with care.
            </p>
            <div class="table-container">
                <table class="table">
                    <thead>
                        <tr>
                            <th>User</th>
                            <th>Email</th>
                            <th>Role</th>
                            <th>Profiles</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="vaultBody">
                        <tr><td colspan="5" style="text-align:center; padding:24px; color:var(--text-secondary);">Loading…</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<!-- Profiles Modal -->
<div id="profilesModal" class="modal">
    <div class="modal-box">
        <div class="modal-header">
            <h2 id="modalTitle">Sender Profiles</h2>
            <button class="modal-close" onclick="closeModal()">×</button>
        </div>
        <div id="modalContent">
            <div style="text-align:center; padding:32px; color:var(--text-secondary)">
                <div class="spinner" style="margin:0 auto 12px;"></div>Loading…
            </div>
        </div>
    </div>
</div>

<script src="/js/api.js"></script>
<script>
requireAdmin();

let loadedProfiles = [];

async function loadVault() {
    try {
        const users = await api.get('/admin/users');
        const tBody = document.getElementById('vaultBody');
        tBody.innerHTML = '';

        if (!users.length) {
            tBody.innerHTML = '<tr><td colspan="5" style="text-align:center">No users found.</td></tr>';
            return;
        }

        for (const u of users) {
            const roleBadge = u.role === 'admin'
                ? `<span class="badge" style="background:rgba(255,107,53,0.2);color:var(--admin-accent)">Admin</span>`
                : '<span class="badge badge-neutral">User</span>';
            tBody.innerHTML += `<tr>
                <td><div style="font-weight:500">${escHtml(u.name || '—')}</div></td>
                <td style="font-size:13px;color:var(--text-secondary)">${escHtml(u.email)}</td>
                <td>${roleBadge}</td>
                <td id="pc-${u.id}"><span style="color:var(--text-muted)">—</span></td>
                <td>
                    <button onclick="viewProfiles('${u.id}','${escAttr(u.name || u.email)}')" class="btn btn-sm btn-secondary">
                        View Profiles
                    </button>
                </td>
            </tr>`;
        }

        for (const u of users) {
            try {
                const profiles = await api.get(`/admin/users/${u.id}/smtp-profiles`);
                const el = document.getElementById(`pc-${u.id}`);
                if (el) el.textContent = profiles.length || 'None';
            } catch (_) {}
        }
    } catch (err) {
        console.error(err);
        document.getElementById('vaultBody').innerHTML =
            `<tr><td colspan="5" style="text-align:center;color:var(--danger)">Failed to load: ${err.message}</td></tr>`;
    }
}

async function viewProfiles(userId, userName) {
    document.getElementById('modalTitle').textContent = userName + ' — Sender Profiles';
    document.getElementById('modalContent').innerHTML =
        `<div style="text-align:center; padding:32px; color:var(--text-secondary)"><div class="spinner" style="margin:0 auto 12px;"></div>Loading…</div>`;
    document.getElementById('profilesModal').classList.add('active');

    try {
        const profiles = await api.get(`/admin/users/${userId}/smtp-profiles`);
        loadedProfiles = profiles;

        if (!profiles.length) {
            document.getElementById('modalContent').innerHTML =
                `<div style="text-align:center; padding:32px; color:var(--text-secondary)">No sender profiles configured for this user.</div>`;
            return;
        }

        let html = '';
        profiles.forEach((p, i) => {
            const sec = p.use_ssl ? 'SSL / TLS' : (p.use_tls ? 'STARTTLS' : 'None');
            const hasImap = !!p.imap_host;
            html += `<div class="profile-block">
                <div class="profile-block-head">
                    ${escHtml(p.name || 'Profile ' + (i + 1))}
                    ${p.is_default ? '<span class="badge badge-success" style="font-size:11px;padding:2px 6px">Default</span>' : ''}
                </div>
                <div class="profile-block-body">
                    <span class="dl">From Name</span>
                    <span class="dv">${escHtml(p.from_name || '—')}</span>
                    <span class="dl">SMTP User</span>
                    <span class="dv">${escHtml(p.smtp_user || '—')}</span>
                    <span class="dl">Host : Port</span>
                    <span class="dv">${escHtml(p.smtp_host || '—')} : ${p.smtp_port || '—'}</span>
                    <span class="dl">Security</span>
                    <span class="dv">${sec}</span>
                    <span class="dl">Reply-To</span>
                    <span class="dv">${escHtml(p.reply_to_email || '—')}</span>
                    <span class="dl">SMTP Password</span>
                    <span class="dv">
                        <span id="pw-smtp-${i}">••••••••</span>
                        <button class="reveal-btn" data-idx="${i}" data-type="smtp" onclick="toggleReveal(this)">👁 Reveal</button>
                    </span>
                    ${hasImap ? `
                    <span class="imap-sep"></span>
                    <span class="imap-label">IMAP (Reply Tracking)</span>
                    <span class="dl">IMAP Host</span>
                    <span class="dv">${escHtml(p.imap_host || '—')} : ${p.imap_port || '—'}</span>
                    <span class="dl">IMAP User</span>
                    <span class="dv">${escHtml(p.imap_user || '—')}</span>
                    <span class="dl">IMAP Password</span>
                    <span class="dv">
                        <span id="pw-imap-${i}">••••••••</span>
                        <button class="reveal-btn" data-idx="${i}" data-type="imap" onclick="toggleReveal(this)">👁 Reveal</button>
                    </span>` : ''}
                </div>
            </div>`;
        });

        document.getElementById('modalContent').innerHTML = html;
    } catch (err) {
        document.getElementById('modalContent').innerHTML =
            `<div style="color:var(--danger); text-align:center; padding:20px">${escHtml(err.message || 'Failed to load profiles')}</div>`;
    }
}

function toggleReveal(btn) {
    const idx = parseInt(btn.dataset.idx);
    const type = btn.dataset.type;
    const profile = loadedProfiles[idx];
    const pw = type === 'smtp' ? profile.smtp_password : profile.imap_password;
    const spanId = `pw-${type}-${idx}`;
    const span = document.getElementById(spanId);
    if (!span) return;

    const hidden = span.textContent === '••••••••';
    span.textContent = hidden ? (pw || '(empty)') : '••••••••';
    btn.textContent = hidden ? '🙈 Hide' : '👁 Reveal';
}

function closeModal() {
    document.getElementById('profilesModal').classList.remove('active');
    loadedProfiles = [];
}

function escHtml(str) {
    const d = document.createElement('div');
    d.textContent = str || '';
    return d.innerHTML;
}

function escAttr(str) {
    return (str || '').replace(/'/g, '&#39;').replace(/"/g, '&quot;');
}

loadVault();
</script>
</body>
</html>
