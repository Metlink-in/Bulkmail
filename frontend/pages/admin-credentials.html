<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credentials - Admin BulkReach Pro</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body class="admin-mode">
    <div class="dashboard-layout">
        <aside class="sidebar" style="background:var(--bg-sidebar);">
            <div class="sidebar-logo" style="color:var(--text-primary)">
                BulkReach <span style="background:var(--admin-accent); color:#000; font-size:10px; font-weight:800; padding:2px 6px; border-radius:4px; margin-left:auto">ADMIN</span>
            </div>
            <nav class="sidebar-nav">
                <a href="/admin.html" class="sidebar-nav-item">Overview</a>
                <a href="/pages/admin-users.html" class="sidebar-nav-item">Users</a>
                <a href="/pages/admin-jobs.html" class="sidebar-nav-item">All Jobs</a>
                <a href="/pages/admin-logs.html" class="sidebar-nav-item">All Logs</a>
                <a href="/pages/admin-credentials.html" class="sidebar-nav-item active">Credentials</a>
                <a href="/pages/admin-live.html" class="sidebar-nav-item" style="color:var(--danger)">Live Monitor</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="page-header">
                <div>
                    <div style="font-size:12px; font-weight:600; color:var(--admin-accent); margin-bottom:4px;">ADMIN &bull; CREDENTIALS</div>
                    <h1 class="page-title">Vault Monitor</h1>
                </div>
            </header>

            <div class="card">
                <p style="color:var(--warning); margin-bottom:24px; font-size:14px; display:flex; align-items:center; gap:8px;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
                    Raw passwords are encrypted at rest. Displaying sanitized outputs only.
                </p>
                <div class="table-container">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>User ID</th>
                                <th>SMTP Host</th>
                                <th>IMAP Host</th>
                                <th>AI Configured</th>
                                <th>Last Updated</th>
                            </tr>
                        </thead>
                        <tbody id="credBody">
                            <tr><td colspan="5" style="text-align:center">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="/js/api.js"></script>
    <script>
        requireAdmin();
        
        async function loadVault() {
            try {
                const users = await api.get('/admin/users');
                const tBody = document.getElementById('credBody');
                tBody.innerHTML = '';
                
                if(users.length === 0) {
                    tBody.innerHTML = '<tr><td colspan="5" style="text-align:center">No configs found.</td></tr>';
                    return;
                }
                
                users.forEach(u => {
                    tBody.innerHTML += `<tr>
                        <td style="font-family:monospace">${u.id.substring(0,8)}</td>
                        <td>${u.has_smtp ? 'Configured ✅' : '<span style="color:var(--text-muted)">Unconfigured</span>'}</td>
                        <td><span style="color:var(--text-muted)">Unconfigured</span></td>
                        <td>${u.has_ai ? 'Configured ✅' : '<span style="color:var(--text-muted)">Unconfigured</span>'}</td>
                        <td>${new Date().toLocaleDateString()}</td>
                    </tr>`;
                });
            } catch (err) { console.error(err); }
        }
        
        loadVault();
    </script>
</body>
</html>
