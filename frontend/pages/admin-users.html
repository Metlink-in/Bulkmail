<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users - Admin BulkReach Pro</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/dashboard.css">
    <style>
        .admin-sidebar-badge { background: var(--admin-accent); color: #000; font-size: 10px; font-weight: 800; padding: 2px 6px; border-radius: 4px; margin-left: auto; }
        .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:999; align-items:center; justify-content:center; }
        .modal.active { display:flex; }
        .modal-box { background: var(--bg-primary); border-radius: var(--radius-xl); width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; padding: 28px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
        .modal-box.wide { max-width: 680px; }
        .modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
        .modal-header h2 { font-size: 17px; font-weight: 700; }
        .modal-close { cursor:pointer; color:var(--text-muted); font-size:22px; line-height:1; background:none; border:none; padding:0; }
        .modal-close:hover { color: var(--text-primary); }
        .modal-footer { display:flex; justify-content:flex-end; gap:10px; margin-top:20px; padding-top:16px; border-top:1px solid var(--border); }
        .profile-block { border: 1px solid var(--border); border-radius: var(--radius-md); margin-bottom: 10px; overflow: hidden; }
        .profile-block-head { padding: 10px 16px; background: var(--bg-secondary); font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 8px; }
        .profile-block-body { padding: 14px 16px; display: grid; grid-template-columns: 110px 1fr; gap: 6px 12px; font-size: 13px; }
        .dl { color: var(--text-muted); font-weight: 500; }
        .dv { color: var(--text-primary); font-family: monospace; word-break: break-all; display: flex; align-items: center; gap: 6px; }
        .reveal-btn { background: none; border: 1px solid var(--border); cursor: pointer; color: var(--primary); font-size: 11px; padding: 1px 6px; border-radius: 4px; flex-shrink: 0; }
        .reveal-btn:hover { background: rgba(37,99,235,0.08); }
    </style>
</head>
<body class="admin-mode">
<div class="dashboard-layout">
    <aside class="sidebar" style="background:var(--bg-sidebar);">
        <div class="sidebar-logo" style="color:var(--text-primary)">
            BulkReach <span class="admin-sidebar-badge">ADMIN</span>
        </div>
        <nav class="sidebar-nav">
            <a href="/admin.html" class="sidebar-nav-item">Overview</a>
            <a href="/pages/admin-users.html" class="sidebar-nav-item active">Users</a>
            <a href="/pages/admin-jobs.html" class="sidebar-nav-item">All Jobs</a>
            <a href="/pages/admin-logs.html" class="sidebar-nav-item">All Logs</a>
            <a href="/pages/admin-credentials.html" class="sidebar-nav-item">Credentials</a>
            <a href="/pages/admin-live.html" class="sidebar-nav-item" style="color:var(--danger)">Live Monitor</a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="page-header">
            <div>
                <div style="font-size:12px; font-weight:600; color:var(--admin-accent); margin-bottom:4px;">ADMIN &bull; USERS</div>
                <h1 class="page-title">User Management</h1>
            </div>
            <button class="btn btn-primary" style="background:var(--admin-accent); color:#000;" onclick="openCreateUser()">+ Create User</button>
        </header>

        <div class="card">
            <div style="display:flex; gap:12px; margin-bottom:16px;">
                <input type="text" id="searchQ" class="input" style="flex:1" placeholder="Search by name or email…"
                    onkeyup="if(event.key==='Enter') loadUsers()">
                <select id="statusFilter" class="input" style="width:140px" onchange="loadUsers()">
                    <option value="">All Status</option>
                    <option value="active">Active</option>
                    <option value="inactive">Inactive</option>
                </select>
                <button class="btn btn-secondary btn-sm" onclick="loadUsers()">Search</button>
            </div>

            <div class="table-container">
                <table class="table">
                    <thead>
                        <tr>
                            <th>User</th>
                            <th>Role</th>
                            <th>Emails Sent</th>
                            <th>Active Jobs</th>
                            <th>Joined</th>
                            <th>Status</th>
                            <th style="min-width:200px">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="usersBody">
                        <tr><td colspan="7" style="text-align:center; padding:24px; color:var(--text-secondary);">Loading…</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<!-- Create User Modal -->
<div id="createUserModal" class="modal">
    <div class="modal-box">
        <div class="modal-header">
            <h2>Create New User</h2>
            <button class="modal-close" onclick="closeModal('createUserModal')">×</button>
        </div>
        <div class="input-group">
            <label class="input-label">Full Name</label>
            <input type="text" id="nuName" class="input" placeholder="Jane Doe">
        </div>
        <div class="input-group">
            <label class="input-label">Email Address</label>
            <input type="email" id="nuEmail" class="input" placeholder="jane@company.com">
        </div>
        <div class="input-group">
            <label class="input-label">Initial Password</label>
            <input type="password" id="nuPass" class="input" placeholder="Min. 6 characters">
        </div>
        <div class="input-group">
            <label class="input-label">Role</label>
            <select id="nuRole" class="input">
                <option value="user">Standard User</option>
                <option value="admin">Administrator</option>
            </select>
        </div>
        <div id="createUserError" style="color:var(--danger); font-size:13px; margin-top:8px; display:none;"></div>
        <div class="modal-footer">
            <button class="btn btn-ghost" onclick="closeModal('createUserModal')">Cancel</button>
            <button class="btn btn-primary" style="background:var(--admin-accent); color:#000;" onclick="confirmCreateUser()">Create User</button>
        </div>
    </div>
</div>

<!-- Reset Password Modal -->
<div id="resetPwModal" class="modal">
    <div class="modal-box">
        <div class="modal-header">
            <h2>Reset Password</h2>
            <button class="modal-close" onclick="closeModal('resetPwModal')">×</button>
        </div>
        <p style="color:var(--text-secondary); font-size:13px; margin-bottom:16px;">
            Resetting password for: <strong id="resetPwUserName"></strong>
        </p>
        <div class="input-group">
            <label class="input-label">New Password</label>
            <input type="password" id="resetPwInput" class="input" placeholder="Min. 6 characters">
        </div>
        <div id="resetPwError" style="color:var(--danger); font-size:13px; margin-top:8px; display:none;"></div>
        <div class="modal-footer">
            <button class="btn btn-ghost" onclick="closeModal('resetPwModal')">Cancel</button>
            <button class="btn btn-primary" onclick="confirmResetPw()">Reset Password</button>
        </div>
    </div>
</div>

<!-- View Config Modal -->
<div id="configModal" class="modal">
    <div class="modal-box wide">
        <div class="modal-header">
            <h2 id="configModalTitle">SMTP Profiles</h2>
            <button class="modal-close" onclick="closeModal('configModal')">×</button>
        </div>
        <div id="configModalContent">
            <div style="text-align:center; padding:32px; color:var(--text-secondary)">
                <div class="spinner" style="margin:0 auto 12px;"></div>Loading…
            </div>
        </div>
    </div>
</div>

<script src="/js/api.js"></script>
<script>
requireAdmin();

let resetPwUserId = null;
let configProfiles = [];

async function loadUsers() {
    const q = document.getElementById('searchQ').value.trim().toLowerCase();
    const s = document.getElementById('statusFilter').value;

    try {
        let users = await api.get('/admin/users');

        if (q) users = users.filter(u =>
            (u.name || '').toLowerCase().includes(q) ||
            (u.email || '').toLowerCase().includes(q));
        if (s === 'active') users = users.filter(u => u.is_active);
        if (s === 'inactive') users = users.filter(u => !u.is_active);

        const tBody = document.getElementById('usersBody');
        tBody.innerHTML = '';

        if (!users.length) {
            tBody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding:24px; color:var(--text-secondary);">No users found.</td></tr>';
            return;
        }

        users.forEach(u => {
            const statusBadge = u.is_active
                ? '<span class="badge badge-success">Active</span>'
                : '<span class="badge badge-danger">Inactive</span>';
            const roleBadge = u.role === 'admin'
                ? `<span class="badge" style="background:rgba(255,107,53,0.2);color:var(--admin-accent)">Admin</span>`
                : '<span class="badge badge-neutral">User</span>';
            const toggleLabel = u.is_active ? 'Deactivate' : 'Activate';

            tBody.innerHTML += `<tr>
                <td>
                    <div style="font-weight:500">${escHtml(u.name || '—')}</div>
                    <div style="font-size:12px;color:var(--text-muted)">${escHtml(u.email)}</div>
                </td>
                <td>${roleBadge}</td>
                <td style="font-weight:600">${u.total_sent || 0}</td>
                <td><span class="badge ${u.active_jobs > 0 ? 'badge-info' : 'badge-neutral'}">${u.active_jobs || 0}</span></td>
                <td style="font-size:13px;color:var(--text-secondary)">${new Date(u.created_at).toLocaleDateString()}</td>
                <td>${statusBadge}</td>
                <td>
                    <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;">
                        <button onclick="impersonate('${u.id}')" class="btn btn-sm btn-secondary" title="Login as this user">👁 View</button>
                        <button onclick="openResetPw('${u.id}','${escAttr(u.name || u.email)}')" class="btn btn-sm btn-ghost">Reset Pwd</button>
                        <button onclick="viewConfig('${u.id}','${escAttr(u.name || u.email)}')" class="btn btn-sm btn-ghost">Config</button>
                        <button onclick="toggleActive('${u.id}', ${u.is_active})" class="btn btn-sm btn-ghost">${toggleLabel}</button>
                        <button onclick="delUser('${u.id}')" class="btn btn-sm" style="color:var(--danger);border:1px solid var(--danger);background:transparent;">Del</button>
                    </div>
                </td>
            </tr>`;
        });
    } catch (err) {
        console.error(err);
        document.getElementById('usersBody').innerHTML =
            `<tr><td colspan="7" style="text-align:center;color:var(--danger)">${escHtml(err.message || 'Load failed')}</td></tr>`;
    }
}

async function impersonate(id) {
    if (!confirm('This will replace your current session. You will need to log back in as admin afterwards. Continue?')) return;
    try {
        const res = await api.get(`/admin/users/${id}/impersonate`);
        localStorage.setItem('access_token', res.access_token);
        window.location.href = '/dashboard.html';
    } catch (e) { alert(e.message); }
}

async function toggleActive(id, current) {
    const action = current ? 'deactivate' : 'activate';
    if (!confirm(`Are you sure you want to ${action} this user?`)) return;
    try {
        await api.post(`/admin/users/${id}/${action}`);
        loadUsers();
    } catch (e) { alert(e.message); }
}

async function delUser(id) {
    const code = prompt("Type DELETE to permanently remove this user and all their data:");
    if (code !== 'DELETE') return;
    try {
        await api.delete(`/admin/users/${id}`);
        loadUsers();
    } catch (e) { alert(e.message); }
}

function openCreateUser() {
    document.getElementById('nuName').value = '';
    document.getElementById('nuEmail').value = '';
    document.getElementById('nuPass').value = '';
    document.getElementById('nuRole').value = 'user';
    document.getElementById('createUserError').style.display = 'none';
    document.getElementById('createUserModal').classList.add('active');
}

async function confirmCreateUser() {
    const payload = {
        name: document.getElementById('nuName').value.trim(),
        email: document.getElementById('nuEmail').value.trim(),
        password: document.getElementById('nuPass').value,
        role: document.getElementById('nuRole').value
    };
    const errEl = document.getElementById('createUserError');
    if (!payload.name || !payload.email || !payload.password) {
        errEl.textContent = 'Please fill all fields.';
        errEl.style.display = 'block';
        return;
    }
    try {
        await api.post('/admin/users', payload);
        closeModal('createUserModal');
        loadUsers();
    } catch (e) {
        errEl.textContent = e.message || 'Create failed';
        errEl.style.display = 'block';
    }
}

function openResetPw(userId, userName) {
    resetPwUserId = userId;
    document.getElementById('resetPwUserName').textContent = userName;
    document.getElementById('resetPwInput').value = '';
    document.getElementById('resetPwError').style.display = 'none';
    document.getElementById('resetPwModal').classList.add('active');
}

async function confirmResetPw() {
    const pw = document.getElementById('resetPwInput').value;
    const errEl = document.getElementById('resetPwError');
    if (!pw || pw.length < 6) {
        errEl.textContent = 'Password must be at least 6 characters.';
        errEl.style.display = 'block';
        return;
    }
    try {
        await api.post(`/admin/users/${resetPwUserId}/reset-password`, { new_password: pw });
        closeModal('resetPwModal');
        alert('Password reset successfully.');
    } catch (e) {
        errEl.textContent = e.message || 'Reset failed';
        errEl.style.display = 'block';
    }
}

async function viewConfig(userId, userName) {
    document.getElementById('configModalTitle').textContent = userName + ' — Sender Profiles';
    document.getElementById('configModalContent').innerHTML =
        `<div style="text-align:center; padding:32px; color:var(--text-secondary)"><div class="spinner" style="margin:0 auto 12px;"></div>Loading…</div>`;
    document.getElementById('configModal').classList.add('active');

    try {
        const profiles = await api.get(`/admin/users/${userId}/smtp-profiles`);
        configProfiles = profiles;

        if (!profiles.length) {
            document.getElementById('configModalContent').innerHTML =
                `<div style="text-align:center; padding:32px; color:var(--text-secondary)">No sender profiles configured.</div>`;
            return;
        }

        let html = '';
        profiles.forEach((p, i) => {
            const sec = p.use_ssl ? 'SSL / TLS' : (p.use_tls ? 'STARTTLS' : 'None');
            const hasImap = !!p.imap_host;
            html += `<div class="profile-block">
                <div class="profile-block-head">
                    ${escHtml(p.name || 'Profile ' + (i + 1))}
                    ${p.is_default ? '<span class="badge badge-success" style="font-size:11px;padding:2px 6px">Default</span>' : ''}
                </div>
                <div class="profile-block-body">
                    <span class="dl">From Name</span><span class="dv">${escHtml(p.from_name || '—')}</span>
                    <span class="dl">SMTP User</span><span class="dv">${escHtml(p.smtp_user || '—')}</span>
                    <span class="dl">Host : Port</span><span class="dv">${escHtml(p.smtp_host || '—')} : ${p.smtp_port || '—'}</span>
                    <span class="dl">Security</span><span class="dv">${sec}</span>
                    <span class="dl">Reply-To</span><span class="dv">${escHtml(p.reply_to_email || '—')}</span>
                    <span class="dl">Password</span>
                    <span class="dv">
                        <span id="cpw-smtp-${i}">••••••••</span>
                        <button class="reveal-btn" data-idx="${i}" data-type="smtp" onclick="toggleReveal(this)">👁 Reveal</button>
                    </span>
                    ${hasImap ? `
                    <span style="grid-column:1/-1; border-top:1px solid var(--border); margin:4px 0;"></span>
                    <span style="grid-column:1/-1; font-size:11px; font-weight:700; letter-spacing:0.8px; text-transform:uppercase; color:var(--text-muted); margin-bottom:2px;">IMAP</span>
                    <span class="dl">IMAP Host</span><span class="dv">${escHtml(p.imap_host)} : ${p.imap_port || '993'}</span>
                    <span class="dl">IMAP User</span><span class="dv">${escHtml(p.imap_user || '—')}</span>
                    <span class="dl">IMAP Pwd</span>
                    <span class="dv">
                        <span id="cpw-imap-${i}">••••••••</span>
                        <button class="reveal-btn" data-idx="${i}" data-type="imap" onclick="toggleReveal(this)">👁 Reveal</button>
                    </span>` : ''}
                </div>
            </div>`;
        });

        document.getElementById('configModalContent').innerHTML = html;
    } catch (err) {
        document.getElementById('configModalContent').innerHTML =
            `<div style="color:var(--danger); text-align:center; padding:20px">${escHtml(err.message || 'Failed')}</div>`;
    }
}

function toggleReveal(btn) {
    const idx = parseInt(btn.dataset.idx);
    const type = btn.dataset.type;
    const profile = configProfiles[idx];
    const pw = type === 'smtp' ? profile.smtp_password : profile.imap_password;
    const spanId = `cpw-${type}-${idx}`;
    const span = document.getElementById(spanId);
    if (!span) return;
    const hidden = span.textContent === '••••••••';
    span.textContent = hidden ? (pw || '(empty)') : '••••••••';
    btn.textContent = hidden ? '🙈 Hide' : '👁 Reveal';
}

function closeModal(id) {
    document.getElementById(id).classList.remove('active');
    if (id === 'resetPwModal') resetPwUserId = null;
    if (id === 'configModal') configProfiles = [];
}

function escHtml(str) {
    const d = document.createElement('div');
    d.textContent = str || '';
    return d.innerHTML;
}

function escAttr(str) {
    return (str || '').replace(/'/g, '&#39;');
}

loadUsers();
</script>
</body>
</html>
