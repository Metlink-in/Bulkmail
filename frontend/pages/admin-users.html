<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users - Admin BulkReach Pro</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/dashboard.css">
    <style>
        .admin-sidebar-badge { background: var(--admin-accent); color: #000; font-size: 10px; font-weight: 800; padding: 2px 6px; border-radius: 4px; margin-left: auto; }
        .action-icon { width: 16px; height: 16px; cursor: pointer; color: var(--text-secondary); transition: var(--transition); }
        .action-icon:hover { color: var(--admin-accent); }
    </style>
</head>
<body class="admin-mode">
    <div class="dashboard-layout">
        <aside class="sidebar" style="background:var(--bg-sidebar);">
            <div class="sidebar-logo" style="color:var(--text-primary)">
                BulkReach <span class="admin-sidebar-badge">ADMIN</span>
            </div>
            <nav class="sidebar-nav">
                <a href="/admin.html" class="sidebar-nav-item">Overview</a>
                <a href="/pages/admin-users.html" class="sidebar-nav-item active">Users</a>
                <a href="/pages/admin-jobs.html" class="sidebar-nav-item">All Jobs</a>
                <a href="/pages/admin-logs.html" class="sidebar-nav-item">All Logs</a>
                <a href="/pages/admin-credentials.html" class="sidebar-nav-item">Credentials</a>
                <a href="/pages/admin-live.html" class="sidebar-nav-item" style="color:var(--danger)">Live Monitor</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="page-header">
                <div>
                    <div style="font-size:12px; font-weight:600; color:var(--admin-accent); margin-bottom:4px;">ADMIN &bull; USERS</div>
                    <h1 class="page-title">User Management</h1>
                </div>
                <button class="btn btn-primary" style="background:var(--admin-accent)" onclick="openCreateUser()">Create User</button>
            </header>

            <div class="card">
                <div style="display:flex; gap:16px; margin-bottom:16px;">
                    <div class="input-group" style="margin:0; flex:1">
                        <input type="text" id="searchQ" class="input" placeholder="Search by name, email, org..." onkeyup="if(event.key==='Enter') loadUsers()">
                    </div>
                    <select id="roleFilter" class="input" style="width:150px" onchange="loadUsers()">
                        <option value="">All Roles</option>
                        <option value="user">User</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>

                <div class="table-container">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>User</th>
                                <th>Role</th>
                                <th>Joined</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="usersBody">
                            <tr><td colspan="5" style="text-align:center">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div id="createUserModal" class="modal-backdrop">
        <div class="modal">
            <div class="modal-header">Create New System User</div>
            <div class="modal-body">
                <div class="input-group">
                    <label class="input-label">Full Name</label>
                    <input type="text" id="nuName" class="input">
                </div>
                <div class="input-group">
                    <label class="input-label">Email Address</label>
                    <input type="email" id="nuEmail" class="input">
                </div>
                <div class="input-group">
                    <label class="input-label">Initial Password</label>
                    <input type="password" id="nuPass" class="input">
                </div>
                <div class="input-group">
                    <label class="input-label">Role</label>
                    <select id="nuRole" class="input">
                        <option value="user">Standard User</option>
                        <option value="admin">Administrator</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                <button class="btn btn-primary" style="background:var(--admin-accent)" onclick="confirmCreateUser()">Create User</button>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script>
        requireAdmin();
        
        async function loadUsers() {
            try {
                const q = document.getElementById('searchQ').value;
                const r = document.getElementById('roleFilter').value;
                const users = await api.get('/admin/users');
                
                let filtered = users;
                if(q) filtered = filtered.filter(u => (u.email && u.email.toLowerCase().includes(q.toLowerCase())) || (u.name && u.name.toLowerCase().includes(q.toLowerCase())));
                if(r) filtered = filtered.filter(u => u.role === r);

                const tBody = document.getElementById('usersBody');
                tBody.innerHTML = '';
                
                if(filtered.length === 0) {
                    tBody.innerHTML = '<tr><td colspan="5" style="text-align:center">No users found.</td></tr>';
                    return;
                }
                
                filtered.forEach(u => {
                    const statusBadge = u.is_active ? '<span class="badge badge-success">Active</span>' : '<span class="badge badge-danger">Inactive</span>';
                    const roleBadge = u.role === 'admin' ? `<span class="badge" style="background:rgba(255,107,53,0.2); color:var(--admin-accent)">Admin</span>` : '<span class="badge badge-neutral">User</span>';
                    tBody.innerHTML += `<tr>
                        <td><div style="font-weight:500">${u.name}</div><div style="font-size:12px;color:var(--text-muted)">${u.email}</div></td>
                        <td>${roleBadge}</td>
                        <td>${new Date(u.created_at).toLocaleDateString()}</td>
                        <td>${statusBadge}</td>
                        <td>
                            <button onclick="impersonate('${u.id}')" class="btn btn-sm btn-ghost" title="Impersonate">👁️</button>
                            <button onclick="toggleActive('${u.id}', ${u.is_active})" class="btn btn-sm btn-secondary">${u.is_active?'Deactivate':'Activate'}</button>
                            <button onclick="delUser('${u.id}')" class="btn btn-sm btn-danger">Del</button>
                        </td>
                    </tr>`;
                });
            } catch (err) { console.error(err); }
        }

        window.impersonate = async (id) => {
            try {
                const res = await api.get(`/admin/users/${id}/impersonate`);
                // Note: impersonate typically returns a temporary access token
                localStorage.setItem('access_token', res.access_token);
                alert("Impersonation active. Redirecting to dashboard.");
                window.location.href = '/dashboard.html';
            } catch(e) { alert(e.message); }
        };
        
        window.toggleActive = async (id, current) => {
            const action = current ? 'deactivate' : 'activate';
            if(confirm(`Are you sure you want to ${action} this user?`)) {
                await api.post(`/admin/users/${id}/${action}`);
                loadUsers();
            }
        };

        window.delUser = async (id) => {
            const code = prompt("Type 'DELETE' to confirm destructive cascade wipe of this org:");
            if(code === 'DELETE') {
                await api.delete(`/admin/users/${id}`);
                loadUsers();
            }
        };

        window.openCreateUser = () => { document.getElementById('createUserModal').style.display = 'flex'; };
        window.closeModal = () => { document.getElementById('createUserModal').style.display = 'none'; };
        
        window.confirmCreateUser = async () => {
            const payload = {
                name: document.getElementById('nuName').value,
                email: document.getElementById('nuEmail').value,
                password: document.getElementById('nuPass').value,
                role: document.getElementById('nuRole').value
            };
            try {
                await api.post('/admin/users', payload);
                closeModal();
                loadUsers();
            } catch(e) { alert(e.message); }
        };

        loadUsers();
    </script>
</body>
</html>
