<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Jobs - Admin BulkReach Pro</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body class="admin-mode">
    <div class="dashboard-layout">
        <aside class="sidebar" style="background:var(--bg-sidebar);">
            <div class="sidebar-logo" style="color:var(--text-primary)">
                BulkReach <span style="background:var(--admin-accent); color:#000; font-size:10px; font-weight:800; padding:2px 6px; border-radius:4px; margin-left:auto">ADMIN</span>
            </div>
            <nav class="sidebar-nav">
                <a href="/admin.html" class="sidebar-nav-item">Overview</a>
                <a href="/pages/admin-users.html" class="sidebar-nav-item">Users</a>
                <a href="/pages/admin-jobs.html" class="sidebar-nav-item active">All Jobs</a>
                <a href="/pages/admin-logs.html" class="sidebar-nav-item">All Logs</a>
                <a href="/pages/admin-credentials.html" class="sidebar-nav-item">Credentials</a>
                <a href="/pages/admin-live.html" class="sidebar-nav-item" style="color:var(--danger)">Live Monitor</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="page-header">
                <div>
                    <div style="font-size:12px; font-weight:600; color:var(--admin-accent); margin-bottom:4px;">ADMIN &bull; JOBS</div>
                    <h1 class="page-title">Global Campaign Manager</h1>
                </div>
            </header>

            <div class="card">
                <div class="table-container">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Job ID</th>
                                <th>User ID</th>
                                <th>Status</th>
                                <th>Sent</th>
                                <th>Failed</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="jobsBody">
                            <tr><td colspan="6" style="text-align:center">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="/js/api.js"></script>
    <script>
        requireAdmin();
        
        async function loadJobs() {
            try {
                const live = await api.get('/admin/live');
                const tBody = document.getElementById('jobsBody');
                tBody.innerHTML = '';
                
                if(!live.running_jobs || live.running_jobs.length === 0) {
                    tBody.innerHTML = '<tr><td colspan="6" style="text-align:center">No active jobs.</td></tr>';
                    return;
                }
                
                live.running_jobs.forEach(j => {
                    tBody.innerHTML += `<tr>
                        <td style="font-family:monospace">${j.job_id.substring(0,8)}</td>
                        <td style="font-family:monospace">${j.user_id.substring(0,8)}</td>
                        <td><span class="badge badge-info">${j.status}</span></td>
                        <td>${j.sent}</td>
                        <td style="color:var(--danger)">${j.failed}</td>
                        <td>
                            <button onclick="alert('Admin cancel override triggered')" class="btn btn-sm btn-danger">Force Cancel</button>
                        </td>
                    </tr>`;
                });
            } catch (err) { console.error(err); }
        }
        
        loadJobs();
    </script>
</body>
</html>
