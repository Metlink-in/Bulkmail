<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>History - BulkReach Pro</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/dashboard.css">
    <style>
        .filter-bar { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; align-items: flex-end; }
        .expanded-row { background: var(--bg-secondary); }
        .sub-table { width: 100%; font-size: 12px; }
        .sub-table th { background: var(--border); }
    </style>
</head>
<body>
    <div class="dashboard-layout">
        <aside class="sidebar">
            <div class="sidebar-logo">BulkReach Pro</div>
            <nav class="sidebar-nav">
                <a href="/dashboard.html" class="sidebar-nav-item">Dashboard</a>
                <a href="/pages/bulk-mail.html" class="sidebar-nav-item">Bulk Mail</a>
                <a href="/pages/history.html" class="sidebar-nav-item active">History</a>
                <a href="/pages/templates.html" class="sidebar-nav-item">Templates</a>
                <a href="/pages/contacts.html" class="sidebar-nav-item">Contacts</a>
                <a href="/pages/schedule.html" class="sidebar-nav-item">Schedules</a>
                <a href="/pages/replies.html" class="sidebar-nav-item">Replies</a>
                <a href="/pages/settings.html" class="sidebar-nav-item">Settings</a>
                <a href="/pages/profile.html" class="sidebar-nav-item">Profile</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="page-header">
                <h1 class="page-title">Campaign History</h1>
                <div class="page-header-actions">
                    <button class="btn btn-secondary" onclick="exportHistory()">Export CSV</button>
                </div>
            </header>

            <div class="filter-bar card">
                <div class="input-group" style="margin-bottom:0">
                    <label class="input-label">Search</label>
                    <input type="text" id="search" class="input" placeholder="Campaign name..." style="width:200px">
                </div>
                <div class="input-group" style="margin-bottom:0">
                    <label class="input-label">Status</label>
                    <select id="statusFilter" class="input" style="width:150px">
                        <option value="">All Statuses</option>
                        <option value="completed">Completed</option>
                        <option value="running">Running</option>
                        <option value="failed">Failed</option>
                        <option value="cancelled">Cancelled</option>
                    </select>
                </div>
                <div class="input-group" style="margin-bottom:0">
                    <label class="input-label">Date From</label>
                    <input type="date" id="dateFrom" class="input">
                </div>
                <button class="btn btn-primary" onclick="loadJobs()">Filter</button>
            </div>

            <div class="card">
                <div class="table-container">
                    <table class="table" id="historyTable">
                        <thead>
                            <tr>
                                <th>Campaign</th>
                                <th>Date</th>
                                <th>Total</th>
                                <th>Sent</th>
                                <th>Failed</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="jobsBody">
                            <tr><td colspan="7" style="text-align:center">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
                
                <div style="margin-top:24px; display:flex; justify-content:space-between; align-items:center;">
                    <div id="paginationInfo" style="font-size:14px; color:var(--text-secondary)">Showing 0 jobs</div>
                    <div style="display:flex; gap:8px;">
                        <button class="btn btn-sm btn-secondary" onclick="changePage(-1)">Prev</button>
                        <button class="btn btn-sm btn-secondary" onclick="changePage(1)">Next</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="toastContainer" class="toast-container"></div>

    <script src="/js/api.js"></script>
    <script src="/js/sidebar.js"></script>
    <script>
        requireAuth();
        let currentPage = 1;

        function showToast(msg, type = 'success') {
            const c = document.getElementById('toastContainer');
            const t = document.createElement('div');
            t.className = `toast toast-${type}`;
            t.textContent = msg;
            c.appendChild(t);
            setTimeout(() => t.remove(), 3500);
        }

        function esc(str) {
            return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        async function loadJobs() {
            try {
                const search = document.getElementById('search').value;
                const status = document.getElementById('statusFilter').value;

                let query = `?page=${currentPage}&limit=25`;
                if(status) query += `&status=${encodeURIComponent(status)}`;
                if(search) query += `&search=${encodeURIComponent(search)}`;

                const jobs = await api.get(`/mail/jobs${query}`);
                const tBody = document.getElementById('jobsBody');
                tBody.innerHTML = '';

                if(jobs.length === 0) {
                    tBody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:32px;color:var(--text-secondary)">No campaigns found.</td></tr>';
                    return;
                }

                for(const j of jobs) {
                    const row = document.createElement('tr');
                    row.style.cursor = 'pointer';
                    row.onclick = (e) => { if(e.target.tagName !== 'BUTTON') toggleRow(j._id); };

                    let badgeClass = 'badge-neutral';
                    if(j.status === 'completed') badgeClass = 'badge-success';
                    if(j.status === 'failed')    badgeClass = 'badge-danger';
                    if(j.status === 'running')   badgeClass = 'badge-info';
                    if(j.status === 'paused')    badgeClass = 'badge-warning';

                    const td = document.createElement('td');
                    const detailBtn = document.createElement('button');
                    detailBtn.className = 'btn btn-sm btn-ghost';
                    detailBtn.textContent = 'Details';
                    detailBtn.onclick = e => { e.stopPropagation(); toggleRow(j._id); };
                    td.appendChild(detailBtn);

                    row.innerHTML = `
                        <td><strong>${esc(j.campaign_name || j._id.substring(0,8))}</strong></td>
                        <td>${new Date(j.created_at).toLocaleDateString()}</td>
                        <td>${esc(j.total_count ?? '--')}</td>
                        <td>${esc(j.sent_count ?? 0)}</td>
                        <td>${esc(j.failed_count ?? 0)}</td>
                        <td><span class="badge ${badgeClass}">${esc(j.status)}</span></td>
                    `;
                    row.appendChild(td);
                    tBody.appendChild(row);
                    
                    // Hidden Detail Row
                    const detailRow = document.createElement('tr');
                    detailRow.id = `detail-${j._id}`;
                    detailRow.className = 'expanded-row';
                    detailRow.style.display = 'none';
                    detailRow.innerHTML = `<td colspan="7" id="logs-${j._id}" style="padding:24px;">Loading logs...</td>`;
                    tBody.appendChild(detailRow);
                }
                document.getElementById('paginationInfo').textContent = `Showing ${jobs.length} campaigns`;
            } catch (err) { console.error(err); }
        }

        async function toggleRow(id) {
            const row = document.getElementById(`detail-${id}`);
            if(row.style.display === 'none') {
                row.style.display = 'table-row';
                const container = document.getElementById(`logs-${id}`);
                try {
                    const logs = await api.get(`/mail/logs?job_id=${id}&limit=10`);
                    if(logs.length === 0) {
                        container.innerHTML = 'No send logs found for this job.';
                    } else {
                        let html = `<table class="sub-table"><thead><tr><th>Recipient</th><th>Time</th><th>Status</th><th>Message ID</th></tr></thead><tbody>`;
                        logs.forEach(l => {
                            html += `<tr>
                                <td>${l.email || l.contact_id}</td>
                                <td>${new Date(l.sent_at).toLocaleString()}</td>
                                <td><span class="badge ${l.status === 'sent' ? 'badge-success' : 'badge-danger'}">${l.status}</span></td>
                                <td><small>${l.message_id || '--'}</small></td>
                            </tr>`;
                        });
                        html += `</tbody></table>`;
                        container.innerHTML = html;
                    }
                } catch(e) { container.innerHTML = 'Failed to load logs.'; }
            } else {
                row.style.display = 'none';
            }
        }

        function changePage(delta) {
            currentPage = Math.max(1, currentPage + delta);
            loadJobs();
        }

        function exportHistory() {
            const rows = [['Campaign', 'Date', 'Total', 'Sent', 'Failed', 'Status']];
            document.querySelectorAll('#jobsBody tr:not([id^="detail-"])').forEach(tr => {
                const cells = tr.querySelectorAll('td');
                if (cells.length >= 6) {
                    rows.push([
                        cells[0].textContent.trim(),
                        cells[1].textContent.trim(),
                        cells[2].textContent.trim(),
                        cells[3].textContent.trim(),
                        cells[4].textContent.trim(),
                        cells[5].textContent.trim()
                    ]);
                }
            });
            if (rows.length <= 1) return showToast('No data to export', 'warning');
            const csv = rows.map(r => r.map(c => `"${c.replace(/"/g, '""')}"`).join(',')).join('\n');
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
            a.download = `campaigns-${new Date().toISOString().slice(0,10)}.csv`;
            a.click();
        }

        loadJobs();
    </script>
</body>
</html>
