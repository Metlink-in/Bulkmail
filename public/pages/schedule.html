<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>Schedules - BulkReach Pro</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/dashboard.css">
    <style>
        .calendar-container { background: var(--bg-primary); border-radius: var(--radius-lg); padding: 24px; border: 1px solid var(--border); margin-bottom: 24px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; margin-top: 16px; }
        .calendar-day { min-height: 100px; padding: 8px; border: 1px solid var(--border); border-radius: var(--radius-sm); position: relative; }
        .calendar-day.today { border-color: var(--primary); background: var(--primary-light); }
        .calendar-header-day { text-align: center; font-weight: 600; font-size: 12px; color: var(--text-secondary); padding-bottom: 8px; }
        .event-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--primary); margin: 2px auto; display: block; }
        .schedule-list-item { display: flex; justify-content: space-between; align-items: center; padding: 16px; border-bottom: 1px solid var(--border); }
        .schedule-list-item:last-child { border-bottom: none; }
    </style>
</head>
<body>
    <div class="dashboard-layout">
        <aside class="sidebar">
            <div class="sidebar-logo">BulkReach Pro</div>
            <nav class="sidebar-nav">
                <a href="/dashboard.html" class="sidebar-nav-item">Dashboard</a>
                <a href="/pages/bulk-mail.html" class="sidebar-nav-item">Bulk Mail</a>
                <a href="/pages/history.html" class="sidebar-nav-item">History</a>
                <a href="/pages/templates.html" class="sidebar-nav-item">Templates</a>
                <a href="/pages/contacts.html" class="sidebar-nav-item">Contacts</a>
                <a href="/pages/schedule.html" class="sidebar-nav-item active">Schedules</a>
                <a href="/pages/replies.html" class="sidebar-nav-item">Replies</a>
                <a href="/pages/settings.html" class="sidebar-nav-item">Settings</a>
                <a href="/pages/profile.html" class="sidebar-nav-item">Profile</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="page-header">
                <h1 class="page-title">Recurring Schedules</h1>
                <div class="page-header-actions">
                    <button class="btn btn-primary" onclick="openScheduleModal()">+ New Schedule</button>
                </div>
            </header>

            <div class="calendar-container">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h3 id="monthYear">January 2024</h3>
                    <div style="display:flex; gap:8px;">
                        <button class="btn btn-sm btn-ghost" onclick="moveMonth(-1)">←</button>
                        <button class="btn btn-sm btn-ghost" onclick="moveMonth(1)">→</button>
                    </div>
                </div>
                <div class="calendar-grid" id="calendarGrid">
                    <!-- Days injected via JS -->
                </div>
            </div>

            <div class="card" style="padding:0">
                <div id="scheduleList">
                    <div style="padding:32px; text-align:center; color:var(--text-secondary)">Loading schedules...</div>
                </div>
            </div>
        </main>
    </div>

    <!-- New Schedule Modal -->
    <div id="scheduleModal" class="modal-backdrop">
        <div class="modal" style="max-width: 600px;">
            <div class="modal-header">Create Recurring Outreach</div>
            <div class="modal-body">
                <div class="input-group">
                    <label class="input-label">Schedule Name</label>
                    <input type="text" id="sName" class="input" placeholder="e.g. Weekly Client Newsletter">
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:16px;">
                    <div class="input-group">
                        <label class="input-label">Template</label>
                        <select id="sTemplate" class="input"></select>
                    </div>
                    <div class="input-group">
                        <label class="input-label">Contact List</label>
                        <select id="sList" class="input"></select>
                    </div>
                </div>
                <div class="input-group">
                    <label class="input-label">Frequency</label>
                    <div style="display:flex; gap:16px; margin:8px 0;">
                        <label style="display:flex; align-items:center; gap:8px;"><input type="radio" name="freq" value="once" checked> Once</label>
                        <label style="display:flex; align-items:center; gap:8px;"><input type="radio" name="freq" value="daily"> Daily</label>
                        <label style="display:flex; align-items:center; gap:8px;"><input type="radio" name="freq" value="weekly"> Weekly</label>
                    </div>
                </div>
                <div id="timingOpts" style="display:grid; grid-template-columns: 1fr 1fr; gap:16px;">
                    <div class="input-group">
                        <label class="input-label">Run At / Time</label>
                        <input type="datetime-local" id="sTime" class="input">
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                <button class="btn btn-primary" onclick="saveSchedule()">Save Schedule</button>
            </div>
        </div>
    </div>

    <div id="toastContainer" class="toast-container"></div>

    <script src="/js/api.js"></script>
    <script src="/js/sidebar.js"></script>
    <script>
        requireAuth();

        let currentDate = new Date();

        function showToast(msg, type="success") {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.textContent = msg;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function openScheduleModal() { document.getElementById('scheduleModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('scheduleModal').style.display = 'none'; }

        async function loadData() {
            try {
                const [schedules, templates, lists] = await Promise.all([
                    api.get('/schedule'),
                    api.get('/template'),
                    api.get('/contacts/lists')
                ]);

                renderSchedules(schedules);
                renderCalendar(schedules);
                
                const tSel = document.getElementById('sTemplate');
                templates.forEach(t => tSel.innerHTML += `<option value="${t.id}">${t.name}</option>`);
                
                const lSel = document.getElementById('sList');
                lists.items.forEach(l => lSel.innerHTML += `<option value="${l.id}">${l.name}</option>`);

            } catch (err) { console.error(err); }
        }

        function renderSchedules(schedules) {
            const list = document.getElementById('scheduleList');
            list.innerHTML = '';
            if(schedules.length === 0) {
                list.innerHTML = '<div style="padding:32px; text-align:center; color:var(--text-secondary)">No schedules found.</div>';
                return;
            }
            schedules.forEach(s => {
                const item = document.createElement('div');
                item.className = 'schedule-list-item';
                item.innerHTML = `
                    <div>
                        <strong style="font-size:16px;">${s.name}</strong>
                        <div style="font-size:12px; color:var(--text-secondary); margin-top:4px;">
                            ${s.recurrence_type.toUpperCase()} • Next run: ${new Date(s.next_run).toLocaleString()}
                        </div>
                    </div>
                    <div style="display:flex; gap:12px; align-items:center;">
                        <span class="badge ${s.is_active ? 'badge-success' : 'badge-neutral'}">${s.is_active ? 'Active' : 'Paused'}</span>
                        <div class="toggle" onclick="toggleActive('${s._id}', ${s.is_active})">
                            <input type="checkbox" ${s.is_active ? 'checked' : ''}>
                            <span class="slider"></span>
                        </div>
                        <button class="btn btn-sm btn-ghost" onclick="deleteSchedule('${s._id}')">✕</button>
                    </div>
                `;
                list.appendChild(item);
            });
        }

        function renderCalendar(schedules) {
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';
            const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            days.forEach(d => grid.innerHTML += `<div class="calendar-header-day">${d}</div>`);

            const firstDay = new Date(currentDate.getFullYear(), currentDate.getMonth(), 1);
            const lastDay = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 0);
            document.getElementById('monthYear').textContent = firstDay.toLocaleString('default', { month: 'long', year: 'numeric' });

            for(let i = 0; i < firstDay.getDay(); i++) grid.innerHTML += '<div class="calendar-day" style="opacity:0.2"></div>';

            for(let d = 1; d <= lastDay.getDate(); d++) {
                const dayDate = new Date(currentDate.getFullYear(), currentDate.getMonth(), d);
                const isToday = dayDate.toDateString() === new Date().toDateString();
                
                const daySchedules = schedules.filter(s => {
                    const sDate = new Date(s.next_run);
                    return sDate.toDateString() === dayDate.toDateString();
                });

                grid.innerHTML += `
                    <div class="calendar-day ${isToday ? 'today' : ''}">
                        <div style="font-size:12px; font-weight:700;">${d}</div>
                        ${daySchedules.map(() => '<span class="event-dot"></span>').join('')}
                    </div>
                `;
            }
        }

        async function saveSchedule() {
            const payload = {
                name: document.getElementById('sName').value,
                template_id: document.getElementById('sTemplate').value,
                contact_list_id: document.getElementById('sList').value,
                recurrence_type: document.querySelector('input[name="freq"]:checked').value,
                run_at: document.getElementById('sTime').value ? new Date(document.getElementById('sTime').value).toISOString() : null
            };
            
            try {
                await api.post('/schedule', payload);
                showToast("Schedule saved!");
                closeModal();
                loadData();
            } catch(e) { showToast(e.message, "danger"); }
        }

        async function toggleActive(id, current) {
            await api.post(`/schedule/${id}/${current ? 'pause' : 'resume'}`);
            loadData();
        }

        async function deleteSchedule(id) {
            if(confirm("Delete this schedule?")) {
                await api.delete(`/schedule/${id}`);
                loadData();
            }
        }

        function moveMonth(delta) {
            currentDate.setMonth(currentDate.getMonth() + delta);
            loadData();
        }

        loadData();
    </script>
</body>
</html>
