<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Monitor - Admin BulkReach Pro</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/dashboard.css">
    <style>
        .pulse-dot { display:inline-block; width:12px; height:12px; border-radius:50%; background:var(--danger); animation: pulse 1s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239,68,68,0.7); } 70% { box-shadow: 0 0 0 10px rgba(239,68,68,0); } 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); } }
        .live-card { background:#161616; border:1px solid #333; padding:16px; border-radius:var(--radius-md); }
    </style>
</head>
<body class="admin-mode">
    <div class="dashboard-layout">
        <aside class="sidebar" style="background:var(--bg-sidebar);">
            <div class="sidebar-logo" style="color:var(--text-primary)">
                BulkReach <span style="background:var(--admin-accent); color:#000; font-size:10px; font-weight:800; padding:2px 6px; border-radius:4px; margin-left:auto">ADMIN</span>
            </div>
            <nav class="sidebar-nav">
                <a href="/admin.html" class="sidebar-nav-item">Overview</a>
                <a href="/pages/admin-users.html" class="sidebar-nav-item">Users</a>
                <a href="/pages/admin-jobs.html" class="sidebar-nav-item">All Jobs</a>
                <a href="/pages/admin-logs.html" class="sidebar-nav-item">All Logs</a>
                <a href="/pages/admin-credentials.html" class="sidebar-nav-item">Credentials</a>
                <a href="/pages/admin-live.html" class="sidebar-nav-item active" style="color:var(--danger)">Live Monitor</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="page-header" style="border-bottom:1px solid var(--border); padding-bottom:16px;">
                <div style="display:flex; align-items:center; gap:16px;">
                    <div class="pulse-dot"></div>
                    <div>
                        <h1 class="page-title" style="margin:0; color:var(--danger)">LIVE TELEMETRY</h1>
                        <div style="font-size:12px; color:var(--text-muted)" id="lastUpdate">Updating every 5s...</div>
                    </div>
                </div>
                <button class="btn btn-danger" id="emergencyBtn" onclick="emergencyPause()">EMERGENCY PAUSE ALL</button>
            </header>

            <div class="stats-grid" style="grid-template-columns: repeat(4, 1fr); margin-top:24px;">
                <div class="live-card">
                    <div style="color:var(--text-muted); font-size:12px; text-transform:uppercase">Active Users Window</div>
                    <div style="font-size:32px; font-weight:700; color:var(--admin-accent)" id="lActive">0</div>
                </div>
                <div class="live-card">
                    <div style="color:var(--text-muted); font-size:12px; text-transform:uppercase">Emails Last Min</div>
                    <div style="font-size:32px; font-weight:700; color:#fff" id="lMin">0</div>
                </div>
                <div class="live-card">
                    <div style="color:var(--text-muted); font-size:12px; text-transform:uppercase">Emails Last Hr</div>
                    <div style="font-size:32px; font-weight:700; color:#fff" id="lHr">0</div>
                </div>
                <div class="live-card">
                    <div style="color:var(--text-muted); font-size:12px; text-transform:uppercase">Active Jobs</div>
                    <div style="font-size:32px; font-weight:700; color:#10B981" id="lJobs">0</div>
                </div>
            </div>

            <h3 style="margin-top:32px; margin-bottom:16px; font-size:14px; text-transform:uppercase; color:var(--text-muted)">Running Job Clusters</h3>
            <div id="jobClusters" style="display:grid; grid-template-columns: repeat(2, 1fr); gap:16px;">
                <div style="padding:24px; border:1px dashed #333; text-align:center; color:#555">No active jobs detected in telemetry stream.</div>
            </div>

        </main>
    </div>

    <script src="/js/api.js"></script>
    <script>
        requireAdmin();

        async function emergencyPause() {
            if (!confirm('Pause ALL currently running jobs? This cannot be undone automatically.')) return;
            const btn = document.getElementById('emergencyBtn');
            btn.disabled = true;
            try {
                const res = await api.post('/admin/emergency-pause', {});
                alert(res.message);
                fetchLive();
            } catch (err) {
                alert('Emergency pause failed: ' + err.message);
            } finally {
                btn.disabled = false;
            }
        }

        async function fetchLive() {
            try {
                const live = await api.get('/admin/live');
                document.getElementById('lActive').textContent = live.active_users_last_5m ?? 0;
                document.getElementById('lMin').textContent   = live.emails_last_minute ?? 0;
                document.getElementById('lHr').textContent    = live.emails_last_hour ?? 0;
                document.getElementById('lJobs').textContent  = live.running_jobs.length;
                document.getElementById('lastUpdate').textContent = "Last sync: " + new Date().toLocaleTimeString();

                const container = document.getElementById('jobClusters');
                if (live.running_jobs.length === 0) {
                    container.innerHTML = '<div style="padding:24px; border:1px dashed #333; text-align:center; color:#555">No active jobs detected in telemetry stream.</div>';
                } else {
                    container.innerHTML = '';
                    live.running_jobs.forEach(j => {
                        const total = j.total || 1;
                        const pct = Math.floor((j.sent / total) * 100);
                        container.innerHTML += `
                        <div class="live-card">
                            <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                                <strong style="font-family:monospace; color:var(--admin-accent)">JOB ${j.job_id.substring(0,8)}</strong>
                                <span class="badge badge-info">${j.status || 'running'}</span>
                            </div>
                            <div style="font-size:12px; color:var(--text-muted); margin-bottom:16px;">${j.user_name || j.user_email || j.user_id || 'Unknown'}</div>
                            <div class="progress-bar-container">
                                <div class="progress-bar-fill" style="width:${pct}%"></div>
                            </div>
                            <div style="display:flex; justify-content:space-between; font-size:12px; margin-top:8px;">
                                <span>Sent: ${j.sent}/${j.total}</span>
                                <span style="color:var(--danger)">Errors: ${j.failed}</span>
                            </div>
                        </div>`;
                    });
                }
            } catch (err) { console.error('Live telemetry error:', err); }
        }

        fetchLive();
        setInterval(fetchLive, 5000);
    </script>
</body>
</html>
