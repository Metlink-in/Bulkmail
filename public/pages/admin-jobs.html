<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>All Jobs - Admin BulkReach Pro</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body class="admin-mode">
    <div class="dashboard-layout">
        <aside class="sidebar" style="background:var(--bg-sidebar);">
            <div class="sidebar-logo" style="color:var(--text-primary)">
                BulkReach <span style="background:var(--admin-accent); color:#000; font-size:10px; font-weight:800; padding:2px 6px; border-radius:4px; margin-left:auto">ADMIN</span>
            </div>
            <nav class="sidebar-nav">
                <a href="/admin.html" class="sidebar-nav-item">Overview</a>
                <a href="/pages/admin-users.html" class="sidebar-nav-item">Users</a>
                <a href="/pages/admin-jobs.html" class="sidebar-nav-item active">All Jobs</a>
                <a href="/pages/admin-logs.html" class="sidebar-nav-item">All Logs</a>
                <a href="/pages/admin-credentials.html" class="sidebar-nav-item">Credentials</a>
                <a href="/pages/admin-live.html" class="sidebar-nav-item" style="color:var(--danger)">Live Monitor</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="page-header">
                <div>
                    <div style="font-size:12px; font-weight:600; color:var(--admin-accent); margin-bottom:4px;">ADMIN &bull; JOBS</div>
                    <h1 class="page-title">Global Campaign Manager</h1>
                </div>
            </header>

            <div class="card">
                <div class="table-container">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Job ID</th>
                                <th>User</th>
                                <th>Status</th>
                                <th>Created</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="jobsBody">
                            <tr><td colspan="6" style="text-align:center">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div id="toastContainer" class="toast-container"></div>

    <script src="/js/api.js"></script>
    <script src="/js/sidebar.js"></script>
    <script>
        requireAdmin();

        function showToast(msg, type = 'success') {
            const t = document.createElement('div');
            t.className = `toast toast-${type}`;
            t.textContent = msg;
            document.getElementById('toastContainer').appendChild(t);
            setTimeout(() => t.remove(), 3500);
        }

        async function loadJobs() {
            try {
                const jobs = await api.get('/admin/mail-jobs?limit=50');
                const tBody = document.getElementById('jobsBody');
                tBody.innerHTML = '';

                if (!jobs || jobs.length === 0) {
                    tBody.innerHTML = '<tr><td colspan="6" style="text-align:center">No jobs found.</td></tr>';
                    return;
                }

                jobs.forEach(j => {
                    let badgeClass = 'badge-neutral';
                    if (j.status === 'running')   badgeClass = 'badge-info';
                    if (j.status === 'completed') badgeClass = 'badge-success';
                    if (j.status === 'failed')    badgeClass = 'badge-danger';
                    if (j.status === 'cancelled') badgeClass = 'badge-danger';

                    const canCancel = ['running','queued','paused'].includes(j.status);
                    tBody.innerHTML += `<tr>
                        <td style="font-family:monospace">${j.id ? j.id.substring(0,8) : '--'}</td>
                        <td>${j.user_email || j.user_name || j.user_id || '--'}</td>
                        <td><span class="badge ${badgeClass}">${j.status}</span></td>
                        <td>${new Date(j.created_at).toLocaleDateString()}</td>
                        <td>
                            ${canCancel
                                ? `<button onclick="forceCancel('${j.id}')" class="btn btn-sm btn-danger">Force Cancel</button>`
                                : '<span style="color:var(--text-muted);font-size:12px">—</span>'
                            }
                        </td>
                    </tr>`;
                });
            } catch (err) {
                document.getElementById('jobsBody').innerHTML =
                    `<tr><td colspan="5" style="text-align:center;color:var(--danger)">${err.message}</td></tr>`;
            }
        }

        async function forceCancel(jobId) {
            if (!confirm('Force-cancel this job?')) return;
            try {
                const res = await api.post(`/admin/jobs/${jobId}/force-cancel`, {});
                showToast(res.message);
                loadJobs();
            } catch (err) {
                showToast(err.message, 'danger');
            }
        }

        loadJobs();
    </script>
</body>
</html>
