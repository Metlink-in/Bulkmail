<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>Login - BulkReach Pro</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/components.css">
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg-secondary); }
        .auth-card { width: 100%; max-width: 400px; padding: 40px; background: var(--bg-primary); border-radius: var(--radius-lg); box-shadow: var(--shadow-md); }
        .logo { text-align: center; font-size: 24px; font-weight: 700; margin-bottom: 32px; color: var(--text-primary); }
        .logo span { color: var(--primary); }
        .alert-error { background: rgba(239,68,68,0.1); color: var(--danger); padding: 12px; border-radius: var(--radius-md); font-size: 14px; margin-bottom: 16px; display: none; }
        .auth-footer { text-align: center; margin-top: 24px; font-size: 14px; color: var(--text-secondary); }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="logo">BulkReach <span>Pro</span></div>
        <div id="errorMsg" class="alert-error"></div>
        <form id="loginForm">
            <div class="input-group">
                <label class="input-label">Email address</label>
                <input type="email" id="email" class="input" required autofocus>
            </div>
            <div class="input-group">
                <label class="input-label" style="display:flex; justify-content:space-between;">
                    Password <a href="#" class="toggle-password" style="font-size:12px; font-weight:400;">Show</a>
                </label>
                <input type="password" id="password" class="input" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%; margin-top:8px;">Sign In</button>
        </form>
        <div class="auth-footer">
            Don't have an account? <a href="/register.html">Sign up</a>
        </div>
    </div>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
</body>
</html>
